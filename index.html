        }

        }

            font-weight: 700;
            font-size: 14px;
            margin-bottom: 10px;
        }

            font-weight: 600;

        }

            flex-direction: column;
            gap: 12px;
        }

            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 6px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;

            border-color: #10b981;
            background: #ecfdf5;
        }

            margin-top: 3px;
            cursor: pointer;
            accent-color: #10b981;
        }

        .option-label {
            flex: 1;
            font-size: 14px;
            color: #1a1a1a;
            cursor: pointer;
            line-height: 1.5;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;

        .btn-primary {
            background: #10b981;
            color: white;
        }

        .btn-primary:hover {
            background: #059669;
        }

        .btn-secondary {
            background: #e5e5e5;
            color: #1a1a1a;
        }

        .btn-secondary:hover {
            background: #d4d4d4;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-container {
            display: none;
        }

        .results-container.active {
            display: block;
        }

        .result-card {
            background: #f8f8f8;
            border: 2px solid #e5e5e5;
            border-radius: 8px;

            color: #1a1a1a;
            font-size: 15px;
        }

            gap: 15px;
            align-items: center;
        }

            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
        }

        .score-actual {
            background: #10b981;
            color: white;
        }

        .score-standard {
            background: #e5e5e5;
            color: #666;
        }

            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pass {
            background: #ecfdf5;
            color: #10b981;
        }

        .status-gap {
            background: #fef3c7;
            color: #f59e0b;
        }

        .level-2 { border-left-color: #f59e0b; }
        .level-3 { border-left-color: #10b981; }
        .level-4 { border-left-color: #3b82f6; }
        .level-5 { border-left-color: #8b5cf6; }

            background: #10b981;
            color: white;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 30px;

            font-size: 24px;
            margin-bottom: 10px;
        }

            font-size: 15px;
            opacity: 0.95;
        }

            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 2px solid #e5e5e5;
        }

            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .navigation-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ĐÁNH GIÁ NĂNG LỰC LÃNH ĐẠO</h1>
            <div class="subtitle">PATI Group - 12 Năng lực Cốt lõi</div>
            <div class="subtitle">48 câu hỏi | Thời gian: ~30 phút</div>
        </div>

        </div>

        <!-- SECTION 1: THÔNG TIN CÁ NHÂN -->
        <div id="section-info" class="question-container active">
            <div class="question-box">
                <div class="question-number">THÔNG TIN CÁ NHÂN</div>
                
                <div class="form-group">
                    <label for="fullName">Họ và tên *</label>

                </div>

                <div class="form-group">
                    <label for="team">Team / Bộ phận *</label>
                    <input type="text" id="team" placeholder="VD: Performance, Creative, Operations..." required>
                </div>

                <div class="form-group">
                    <label for="level">Cấp bậc hiện tại *</label>
                    <select id="level" required>
                        <option value="">-- Chọn cấp bậc --</option>
                        <option value="Manager">Manager</option>
                        <option value="C-Level">C-Level</option>
                    </select>
                </div>
            </div>

            <div class="navigation-buttons">
                <div></div>
                <button class="btn btn-primary" onclick="startAssessment()">Bắt đầu làm bài →</button>
            </div>
        </div>

        <!-- SECTION 2-4: CÂU HỎI (sẽ được generate bởi JavaScript) -->
        <div id="questionsContainer"></div>

        <!-- RESULTS SECTION -->
        <div id="results" class="results-container"></div>
    </div>

        // Mapping chuẩn theo ảnh đã gửi
        const STANDARDS = {
            "Manager": {
                "Thiết lập Mục tiêu": 4,
                "Lập Kế hoạch": 4,
                "Tổ chức Bộ máy": 3,
                "Xây dựng Quy trình": 3,
                "Đảm bảo Nguồn lực": 4,
                "Kiểm soát & Rủi ro": 4,
                "Tuyển dụng": 4,
                "Đào tạo & Kèm cặp": 4,
                "Đánh giá & Khích lệ": 4,
                "Giao tiếp": 4,
                "Truyền cảm hứng": 4,
                "Chuyên môn Tiên phong": 4
            },
            "C-Level": {
                "Thiết lập Mục tiêu": 5,
                "Lập Kế hoạch": 4,
                "Tổ chức Bộ máy": 4,
                "Xây dựng Quy trình": 4,
                "Đảm bảo Nguồn lực": 5,
                "Kiểm soát & Rủi ro": 4,
                "Tuyển dụng": 5,
                "Đào tạo & Kèm cặp": 5,
                "Đánh giá & Khích lệ": 5,
                "Giao tiếp": 5,
                "Truyền cảm hứng": 5,
                "Chuyên môn Tiên phong": 5
            }
        };

        // ==================== STATE ====================
        let currentSection = 'info';
        let answers = {};
        let userInfo = {};

        // ==================== FUNCTIONS ====================
        function startAssessment() {
            const fullName = document.getElementById('fullName').value.trim();
            const team = document.getElementById('team').value.trim();
            const level = document.getElementById('level').value;

            if (!fullName || !team || !level) {
                alert('Vui lòng điền đầy đủ thông tin!');
                return;
            }

            userInfo = { fullName, team, level };
            
            document.getElementById('section-info').classList.remove('active');
            renderQuestions();
            showSection(1);
            updateProgress();
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            const sections = [
                { id: 1, questions: QUESTIONS.slice(0, 16) },
                { id: 2, questions: QUESTIONS.slice(16, 32) },
                { id: 3, questions: QUESTIONS.slice(32, 48) }
            ];

            sections.forEach(section => {
                const sectionDiv = document.createElement('div');
                sectionDiv.id = `section-${section.id}`;
                sectionDiv.className = 'question-container';

                section.questions.forEach((q, index) => {
                    const questionDiv = document.createElement('div');
                    questionDiv.className = 'question-box';
                    questionDiv.innerHTML = `
                        <div class="question-number">${q.id}/48. ${q.competency}</div>
                        <div class="question-text">${q.text}</div>
                        <div class="options">
                            ${q.options.map((opt, i) => `
                                <label class="option" onclick="selectOption(${q.id}, ${i + 1}, this)">
                                    <input type="radio" name="q${q.id}" value="${i + 1}">
                                    <span class="option-label"><strong>${String.fromCharCode(65 + i)}.</strong> ${opt}</span>
                                </label>
                            `).join('')}
                        </div>
                    `;
                    sectionDiv.appendChild(questionDiv);
                });

                // Navigation buttons
                const navDiv = document.createElement('div');
                navDiv.className = 'navigation-buttons';
                navDiv.innerHTML = `
                    <button class="btn btn-secondary" onclick="previousSection(${section.id})" ${section.id === 1 ? 'style="visibility:hidden"' : ''}>
                        ← Quay lại
                    </button>
                    <button class="btn btn-primary" onclick="${section.id === 3 ? 'submitAssessment()' : `nextSection(${section.id})`}">
                        ${section.id === 3 ? 'Hoàn thành & Xem kết quả' : 'Tiếp theo →'}
                    </button>
                `;
                sectionDiv.appendChild(navDiv);
                container.appendChild(sectionDiv);
            });
        }

        function selectOption(questionId, value, element) {
            answers[questionId] = value;
            
            // Visual feedback
            const parent = element.closest('.options');
            parent.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
        }

        function showSection(sectionNum) {
            document.querySelectorAll('.question-container').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(`section-${sectionNum}`).classList.add('active');
            currentSection = sectionNum;
            updateProgress();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextSection(currentNum) {
            showSection(currentNum + 1);
        }

        function previousSection(currentNum) {
            showSection(currentNum - 1);
        }

        function updateProgress() {
            const total = 48;
            const answered = Object.keys(answers).length;
            const percentage = currentSection === 'info' ? 0 : (answered / total) * 100;
            
            document.getElementById('progressBar').style.width = percentage + '%';
            
            let progressText = '';
            if (currentSection === 'info') {
                progressText = 'Phần 1: Thông tin cá nhân';
            } else if (currentSection === 1) {
                progressText = `Phần 2: Câu 1-16 (${answered}/48 câu đã trả lời)`;
            } else if (currentSection === 2) {
                progressText = `Phần 3: Câu 17-32 (${answered}/48 câu đã trả lời)`;
            } else if (currentSection === 3) {
                progressText = `Phần 4: Câu 33-48 (${answered}/48 câu đã trả lời)`;
            }
            
            document.getElementById('progressText').textContent = progressText;
        }

        function submitAssessment() {
            if (Object.keys(answers).length < 48) {
                alert('Vui lòng trả lời đầy đủ 48 câu hỏi!');
                return;
            }

            calculateResults();
            showResults();
        }

        function calculateResults() {
            // Calculate average score for each competency
            const competencies = {
                "Thiết lập Mục tiêu": [1, 2, 3, 4],
                "Lập Kế hoạch": [5, 6, 7, 8],
                "Tổ chức Bộ máy": [9, 10, 11, 12],
                "Xây dựng Quy trình": [13, 14, 15, 16],
                "Đảm bảo Nguồn lực": [17, 18, 19, 20],
                "Kiểm soát & Rủi ro": [21, 22, 23, 24],
                "Tuyển dụng": [25, 26, 27, 28],
                "Đào tạo & Kèm cặp": [29, 30, 31, 32],
                "Đánh giá & Khích lệ": [33, 34, 35, 36],
                "Giao tiếp": [37, 38, 39, 40],
                "Truyền cảm hứng": [41, 42, 43, 44],
                "Chuyên môn Tiên phong": [45, 46, 47, 48]
            };

            userInfo.scores = {};
            for (const [comp, qIds] of Object.entries(competencies)) {
                const scores = qIds.map(id => answers[id]);
                const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
                userInfo.scores[comp] = Math.round(avg);
            }
        }

        function showResults() {
            document.querySelectorAll('.question-container').forEach(el => el.style.display = 'none');
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressText').textContent = 'Hoàn thành đánh giá!';

            const resultsDiv = document.getElementById('results');
            resultsDiv.classList.add('active');

            const standard = STANDARDS[userInfo.level];
            let passCount = 0;
            let gapCount = 0;

            let html = `
                <div class="summary-box">
                    <h2>KẾT QUẢ ĐÁNH GIÁ NĂNG LỰC LÃNH ĐẠO</h2>
                    <p><strong>${userInfo.fullName}</strong> - ${userInfo.team} (${userInfo.level})</p>
                </div>

                <h3 style="margin-bottom: 20px; color: #1a1a1a;">Chi tiết 12 Năng lực:</h3>
            `;

            for (const [comp, score] of Object.entries(userInfo.scores)) {
                const standardScore = standard[comp];
                const isPass = score >= standardScore;
                if (isPass) passCount++;
                else gapCount++;

                html += `
                    <div class="result-card level-${score}">
                        <div class="result-header">
                            <div class="competency-name">${comp}</div>
                            <div class="result-scores">
                                <div class="score-box score-actual">Bạn: Level ${score}</div>
                                <div class="score-box score-standard">Chuẩn: Level ${standardScore}</div>
                                <div class="status-badge ${isPass ? 'status-pass' : 'status-gap'}">
                                    ${isPass ? '✅ Đạt chuẩn' : '⚠️ Gap (cần phát triển)'}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            html += `
                <div style="margin-top: 30px; padding: 20px; background: #f8f8f8; border-radius: 8px;">
                    <h3 style="color: #1a1a1a; margin-bottom: 15px;">Tổng kết:</h3>
                    <p style="font-size: 15px; color: #666; margin-bottom: 8px;">
                        ✅ <strong>${passCount}/12</strong> năng lực đạt chuẩn
                    </p>
                    <p style="font-size: 15px; color: #666;">
                        ⚠️ <strong>${gapCount}/12</strong> năng lực cần phát triển
                    </p>
                </div>

                <div style="margin-top: 20px; padding: 15px; background: #ecfdf5; border-left: 4px solid #10b981; border-radius: 6px;">
                    <p style="font-size: 14px; color: #059669; margin: 0;">
                        ✓ Kết quả của bạn đã được lưu tự động. Cảm ơn bạn đã hoàn thành bài đánh giá!
                    </p>
                </div>
            `;

            resultsDiv.innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Tự động lưu kết quả vào Google Sheet
            saveToGoogleSheet();
        }

        // Tự động lưu kết quả vào Google Sheet
        function saveToGoogleSheet() {
            // Quyên cần update URL này sau khi deploy Google Apps Script
            const SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE';
            
            // Gửi data về Google Sheet
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userInfo)
            }).then(() => {
                console.log('✓ Đã lưu kết quả vào Google Sheet');
            }).catch((error) => {
                console.log('⚠ Lỗi khi lưu Google Sheet:', error);
                // Không hiển thị lỗi cho user, vì mode: 'no-cors' không trả về response
            });
        }
    </script>
